<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修仙模拟器 - 核心系统测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .test-section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .test-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .test-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            transition: transform 0.2s;
        }
        
        .test-btn:hover {
            transform: translateY(-2px);
        }
        
        .test-btn:active {
            transform: translateY(0);
        }
        
        .result {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .success {
            color: #28a745;
            font-weight: bold;
        }
        
        .error {
            color: #dc3545;
            font-weight: bold;
        }
        
        .info {
            color: #17a2b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧘 修仙模拟器 - 核心系统测试</h1>
        
        <!-- 事件总线测试 -->
        <div class="test-section">
            <h2>📡 事件总线系统测试</h2>
            <button class="test-btn" onclick="testEventBus()">测试事件订阅/发布</button>
            <button class="test-btn" onclick="testEventOnce()">测试 once（单次触发）</button>
            <button class="test-btn" onclick="testEventOff()">测试取消订阅</button>
            <div id="eventBusResult" class="result">等待测试...</div>
        </div>
        
        <!-- 状态管理测试 -->
        <div class="test-section">
            <h2>📊 状态管理系统测试</h2>
            <button class="test-btn" onclick="testStateInit()">初始化状态</button>
            <button class="test-btn" onclick="testStateGet()">获取状态</button>
            <button class="test-btn" onclick="testStateSet()">设置状态</button>
            <button class="test-btn" onclick="testStateSnapshot()">保存快照</button>
            <button class="test-btn" onclick="testStateRestore()">恢复快照</button>
            <div id="stateResult" class="result">等待测试...</div>
        </div>
        
        <!-- 存储管理测试 -->
        <div class="test-section">
            <h2>💾 存储管理系统测试</h2>
            <button class="test-btn" onclick="testStorageSave()">保存数据</button>
            <button class="test-btn" onclick="testStorageLoad()">加载数据</button>
            <button class="test-btn" onclick="testStorageCache()">测试缓存</button>
            <button class="test-btn" onclick="testStorageExport()">导出数据</button>
            <div id="storageResult" class="result">等待测试...</div>
        </div>
        
        <!-- 游戏引擎测试 -->
        <div class="test-section">
            <h2>🎮 游戏引擎测试</h2>
            <button class="test-btn" onclick="testGameInit()">初始化游戏</button>
            <button class="test-btn" onclick="testGameCultivate()">修炼</button>
            <button class="test-btn" onclick="testGameBreakthrough()">突破</button>
            <button class="test-btn" onclick="testGameSave()">保存游戏</button>
            <button class="test-btn" onclick="testGameLoad()">加载游戏</button>
            <div id="gameResult" class="result">等待测试...</div>
        </div>
    </div>
    
    <script type="module">
        import { eventBus, GameEvents } from './core/event-bus.js';
        import { stateManager } from './core/state-manager.js';
        import { storageManager } from './core/storage-manager.js';
        import { game } from './core/game-engine.js';
        
        // 暴露到全局以便测试
        window.testModules = {
            eventBus,
            GameEvents,
            stateManager,
            storageManager,
            game,
        };
        
        // 辅助函数
        function log(elementId, message, type = 'info') {
            const el = document.getElementById(elementId);
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'success' ? 'success' : type === 'error' ? 'error' : 'info';
            el.innerHTML += `\n<span class="${className}">[${timestamp}] ${message}</span>`;
            el.scrollTop = el.scrollHeight;
        }
        
        function clearLog(elementId) {
            document.getElementById(elementId).innerHTML = '';
        }
        
        // 事件总线测试
        window.testEventBus = function() {
            clearLog('eventBusResult');
            let count = 0;
            
            eventBus.on('test:event', (data) => {
                count++;
                log('eventBusResult', `收到事件 #${count}: ${JSON.stringify(data)}`, 'success');
            });
            
            eventBus.emit('test:event', { message: 'Hello', index: 1 });
            setTimeout(() => {
                eventBus.emit('test:event', { message: 'World', index: 2 });
                log('eventBusResult', `总共收到 ${count} 次事件`, 'info');
            }, 500);
        };
        
        window.testEventOnce = function() {
            clearLog('eventBusResult');
            
            eventBus.once('test:once', (data) => {
                log('eventBusResult', `收到单次事件：${JSON.stringify(data)}`, 'success');
            });
            
            eventBus.emit('test:once', { test: 'first' });
            eventBus.emit('test:once', { test: 'second' });
            log('eventBusResult', '第二次事件不会被接收', 'info');
        };
        
        window.testEventOff = function() {
            clearLog('eventBusResult');
            
            const callback = (data) => {
                log('eventBusResult', `收到事件：${JSON.stringify(data)}`, 'success');
            };
            
            eventBus.on('test:off', callback);
            log('eventBusResult', '已订阅事件', 'info');
            
            eventBus.emit('test:off', { test: 'before' });
            
            setTimeout(() => {
                eventBus.off('test:off', callback);
                log('eventBusResult', '已取消订阅', 'info');
                eventBus.emit('test:off', { test: 'after' });
                log('eventBusResult', '这次不会收到', 'info');
            }, 500);
        };
        
        // 状态管理测试
        window.testStateInit = function() {
            clearLog('stateResult');
            
            stateManager.init({
                player: { name: '测试玩家', level: 1 },
                score: 0,
            });
            
            log('stateResult', '状态初始化成功', 'success');
            log('stateResult', `初始数据：${JSON.stringify(stateManager.getState(), null, 2)}`, 'info');
        };
        
        window.testStateGet = function() {
            clearLog('stateResult');
            
            const name = stateManager.get('player.name');
            const level = stateManager.get('player.level');
            
            log('stateResult', `获取玩家名称：${name}`, 'success');
            log('stateResult', `获取玩家等级：${level}`, 'success');
        };
        
        window.testStateSet = function() {
            clearLog('stateResult');
            
            stateManager.set('player.level', 2);
            log('stateResult', '设置等级为 2', 'success');
            
            stateManager.set('player.score', 100);
            log('stateResult', '设置分数为 100', 'success');
            
            log('stateResult', `当前状态：${JSON.stringify(stateManager.getState(), null, 2)}`, 'info');
        };
        
        window.testStateSnapshot = function() {
            clearLog('stateResult');
            
            stateManager.saveSnapshot('测试快照 1');
            log('stateResult', '已保存快照', 'success');
            
            stateManager.set('player.level', 99);
            log('stateResult', `修改等级为 99: ${stateManager.get('player.level')}`, 'info');
            
            const snapshots = stateManager.getSnapshots();
            log('stateResult', `快照列表：${JSON.stringify(snapshots, null, 2)}`, 'info');
        };
        
        window.testStateRestore = function() {
            clearLog('stateResult');
            
            const success = stateManager.restoreSnapshot(-1);
            if (success) {
                log('stateResult', '已恢复到上一个快照', 'success');
                log('stateResult', `恢复后状态：${JSON.stringify(stateManager.getState(), null, 2)}`, 'info');
            } else {
                log('stateResult', '恢复失败，没有可用的快照', 'error');
            }
        };
        
        // 存储管理测试
        window.testStorageSave = function() {
            clearLog('storageResult');
            
            const testData = {
                player: '测试玩家',
                score: 1000,
                items: ['item1', 'item2'],
            };
            
            const success = storageManager.save('test_data', testData);
            log('storageResult', `保存${success ? '成功' : '失败'}`, success ? 'success' : 'error');
            log('storageResult', `数据：${JSON.stringify(testData)}`, 'info');
        };
        
        window.testStorageLoad = function() {
            clearLog('storageResult');
            
            const data = storageManager.load('test_data');
            if (data) {
                log('storageResult', '加载成功', 'success');
                log('storageResult', `数据：${JSON.stringify(data, null, 2)}`, 'info');
            } else {
                log('storageResult', '加载失败或数据不存在', 'error');
            }
        };
        
        window.testStorageCache = function() {
            clearLog('storageResult');
            
            storageManager.setCache('temp', '临时数据', 5000); // 5 秒过期
            log('storageResult', '已设置缓存（5 秒后过期）', 'success');
            
            const cached = storageManager.getCache('temp');
            log('storageResult', `获取缓存：${cached}`, 'info');
            
            setTimeout(() => {
                const expired = storageManager.getCache('temp');
                log('storageResult', `5 秒后获取缓存：${expired || '已过期'}`, 'info');
            }, 5000);
        };
        
        window.testStorageExport = function() {
            clearLog('storageResult');
            
            const allData = storageManager.exportAll();
            log('storageResult', `导出所有数据 (${Object.keys(allData).length} 项)`, 'success');
            log('storageResult', JSON.stringify(allData, null, 2), 'info');
        };
        
        // 游戏引擎测试
        window.testGameInit = function() {
            clearLog('gameResult');
            
            game.init('测试道友');
            log('gameResult', '游戏初始化成功', 'success');
            
            const info = game.getPlayerInfo();
            log('gameResult', `玩家信息：${JSON.stringify(info, null, 2)}`, 'info');
        };
        
        window.testGameCultivate = function() {
            clearLog('gameResult');
            
            const result = game.cultivate();
            log('gameResult', `修炼结果：${JSON.stringify(result, null, 2)}`, 'success');
            
            const info = game.getPlayerInfo();
            log('gameResult', `当前修为：${info.cultivation}/${info.maxCultivation}`, 'info');
        };
        
        window.testGameBreakthrough = function() {
            clearLog('gameResult');
            
            // 先设置足够的修为
            stateManager.set('player.cultivation', 100);
            log('gameResult', '已设置修为为 100（满足突破条件）', 'info');
            
            const result = game.breakthrough();
            log('gameResult', `突破结果：${JSON.stringify(result, null, 2)}`, result.success ? 'success' : 'error');
            
            const info = game.getPlayerInfo();
            log('gameResult', `当前境界：${info.realmName}`, 'info');
        };
        
        window.testGameSave = function() {
            clearLog('gameResult');
            
            const success = game.saveGame();
            log('gameResult', `保存${success ? '成功' : '失败'}`, success ? 'success' : 'error');
        };
        
        window.testGameLoad = function() {
            clearLog('gameResult');
            
            const result = game.loadGame();
            log('gameResult', `加载${result.success ? '成功' : '失败'}`, result.success ? 'success' : 'error');
            
            if (result.success) {
                const info = game.getPlayerInfo();
                log('gameResult', `加载的玩家信息：${JSON.stringify(info, null, 2)}`, 'info');
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>属性分配系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary-color: #8b5cf6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #334155;
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        /* 初始进入界面 */
        .enter-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .enter-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .enter-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 50px;
            text-align: center;
            max-width: 500px;
            line-height: 1.8;
        }

        .btn-enter {
            position: relative;
            padding: 20px 60px;
            font-size: 22px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow-lg), 0 0 40px rgba(99, 102, 241, 0.3);
        }

        .btn-enter::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-enter:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: var(--shadow-lg), 0 0 60px rgba(99, 102, 241, 0.5);
        }

        .btn-enter:hover::before {
            left: 100%;
        }

        .btn-enter:active {
            transform: translateY(0) scale(0.98);
        }

        /* 主系统界面 */
        .system-screen {
            display: none;
            animation: slideUp 0.6s ease;
        }

        .system-screen.active {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .system-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .system-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .system-desc {
            font-size: 16px;
            color: var(--text-secondary);
        }

        /* 角色展示区 */
        .character-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .character-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 30px;
            transition: var(--transition);
        }

        .character-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* 抽取属性区域 */
        .draw-section {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: var(--radius-lg);
            padding: 30px;
            text-align: center;
        }

        .draw-result {
            min-height: 200px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }

        .attribute-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 500;
            animation: popIn 0.4s ease backwards;
        }

        .attribute-item:nth-child(1) { animation-delay: 0.1s; border-color: #ef4444; }
        .attribute-item:nth-child(2) { animation-delay: 0.2s; border-color: #f59e0b; }
        .attribute-item:nth-child(3) { animation-delay: 0.3s; border-color: #10b981; }
        .attribute-item:nth-child(4) { animation-delay: 0.4s; border-color: #3b82f6; }
        .attribute-item:nth-child(5) { animation-delay: 0.5s; border-color: #8b5cf6; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .attribute-name {
            color: var(--text-secondary);
        }

        .attribute-value {
            color: var(--text-primary);
            font-weight: 700;
            font-size: 18px;
        }

        .attribute-value.positive { color: var(--success-color); }
        .attribute-value.negative { color: var(--error-color); }

        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .btn {
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg), 0 0 30px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #059669);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg), 0 0 30px rgba(16, 185, 129, 0.4);
        }

        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            transform: translateY(-3px);
        }

        .btn-loading {
            position: relative;
            pointer-events: none;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 角色属性展示 */
        .character-attributes {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .attr-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .attr-label {
            min-width: 80px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .attr-bar-container {
            flex: 1;
            height: 24px;
            background: var(--bg-dark);
            border-radius: var(--radius-sm);
            overflow: hidden;
            position: relative;
        }

        .attr-bar {
            height: 100%;
            border-radius: var(--radius-sm);
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .attr-bar.strength { background: linear-gradient(90deg, #ef4444, #f87171); }
        .attr-bar.agility { background: linear-gradient(90deg, #10b981, #34d399); }
        .attr-bar.intelligence { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .attr-bar.vitality { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .attr-bar.luck { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }

        .attr-value-display {
            min-width: 45px;
            text-align: right;
            font-weight: 600;
            font-size: 14px;
        }

        .attr-value-display.increased {
            color: var(--success-color);
            animation: flashGreen 0.5s ease;
        }

        @keyframes flashGreen {
            0%, 100% { color: var(--text-primary); }
            50% { color: var(--success-color); transform: scale(1.2); }
        }

        /* 消息提示 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 16px 24px;
            border-radius: var(--radius-md);
            color: white;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast.success { background: linear-gradient(135deg, var(--success-color), #059669); }
        .toast.error { background: linear-gradient(135deg, var(--error-color), #dc2626); }
        .toast.warning { background: linear-gradient(135deg, var(--warning-color), #d97706); }
        .toast.info { background: linear-gradient(135deg, var(--primary-color), var(--primary-dark)); }

        .toast.hiding {
            animation: slideOutRight 0.4s ease forwards;
        }

        @keyframes slideOutRight {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100px); }
        }

        /* 分配记录 */
        .allocation-log {
            margin-top: 30px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .log-entry {
            padding: 10px 15px;
            margin-bottom: 8px;
            background: var(--bg-dark);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text-secondary);
            border-left: 3px solid var(--primary-color);
        }

        .log-entry:last-child {
            margin-bottom: 0;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .enter-title {
                font-size: 32px;
            }
            
            .enter-subtitle {
                font-size: 16px;
            }
            
            .btn-enter {
                padding: 16px 40px;
                font-size: 18px;
            }
            
            .character-section {
                grid-template-columns: 1fr;
            }
            
            .system-title {
                font-size: 28px;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 初始进入界面 -->
        <div class="enter-screen" id="enterScreen">
            <h1 class="enter-title">属性分配系统</h1>
            <p class="enter-subtitle">
                抽取随机属性，分配给角色角色<br>
                体验Roguelike式的随机属性获取乐趣
            </p>
            <button class="btn-enter" onclick="enterSystem()">
                🚀 进入系统
            </button>
        </div>

        <!-- 主系统界面 -->
        <div class="system-screen" id="systemScreen">
            <div class="system-header">
                <h2 class="system-title">🎮 属性分配系统</h2>
                <p class="system-desc">抽取属性 → 分配给角色</p>
            </div>

            <div class="character-section">
                <!-- 抽取属性区域 -->
                <div class="draw-section">
                    <div class="card-title">
                        <span class="card-title-icon">🎁</span>
                        抽取属性
                    </div>
                    <div class="draw-result" id="drawResult">
                        <div class="empty-state">
                            <div class="empty-state-icon">✨</div>
                            <p>点击"抽取属性"开始</p>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="btnDraw" onclick="drawAttributes()">
                            <span>🎲</span> 抽取属性
                        </button>
                    </div>
                </div>

                <!-- 角色属性展示 -->
                <div class="character-card">
                    <div class="card-title">
                        <span class="card-title-icon">👤</span>
                        角色属性
                    </div>
                    <div class="character-attributes" id="characterAttributes">
                        <div class="attr-row">
                            <span class="attr-label">力量</span>
                            <div class="attr-bar-container">
                                <div class="attr-bar strength" id="barStrength" style="width: 10%"></div>
                            </div>
                            <span class="attr-value-display" id="valStrength">10</span>
                        </div>
                        <div class="attr-row">
                            <span class="attr-label">敏捷</span>
                            <div class="attr-bar-container">
                                <div class="attr-bar agility" id="barAgility" style="width: 10%"></div>
                            </div>
                            <span class="attr-value-display" id="valAgility">10</span>
                        </div>
                        <div class="attr-row">
                            <span class="attr-label">智力</span>
                            <div class="attr-bar-container">
                                <div class="attr-bar intelligence" id="barIntelligence" style="width: 10%"></div>
                            </div>
                            <span class="attr-value-display" id="valIntelligence">10</span>
                        </div>
                        <div class="attr-row">
                            <span class="attr-label">体质</span>
                            <div class="attr-bar-container">
                                <div class="attr-bar vitality" id="barVitality" style="width: 10%"></div>
                            </div>
                            <span class="attr-value-display" id="valVitality">10</span>
                        </div>
                        <div class="attr-row">
                            <span class="attr-label">幸运</span>
                            <div class="attr-bar-container">
                                <div class="attr-bar luck" id="barLuck" style="width: 10%"></div>
                            </div>
                            <span class="attr-value-display" id="valLuck">10</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="btn-group" style="margin-bottom: 30px;">
                <button class="btn btn-success" id="btnAllocate" onclick="allocateAttributes()" disabled>
                    <span>📥</span> 分配属性
                </button>
                <button class="btn btn-secondary" onclick="resetSystem()">
                    <span>🔄</span> 重置
                </button>
            </div>

            <!-- 分配记录 -->
            <div class="allocation-log">
                <div class="log-title">📋 分配记录</div>
                <div id="allocationLog">
                    <div class="empty-state">
                        <p>暂无分配记录</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 消息提示容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // 状态管理
        const state = {
            drawnAttributes: null,
            character: {
                strength: 10,
                agility: 10,
                intelligence: 10,
                vitality: 10,
                luck: 10
            },
            maxAttribute: 100,
            allocationCount: 0
        };

        // 属性定义
        const attributeTypes = [
            { key: 'strength', name: '力量', icon: '💪', min: 5, max: 25 },
            { key: 'agility', name: '敏捷', icon: '⚡', min: 5, max: 25 },
            { key: 'intelligence', name: '智力', icon: '🧠', min: 5, max: 25 },
            { key: 'vitality', name: '体质', icon: '❤️', min: 5, max: 25 },
            { key: 'luck', name: '幸运', icon: '🍀', min: 5, max: 25 }
        ];

        // 进入系统
        function enterSystem() {
            document.getElementById('enterScreen').style.display = 'none';
            document.getElementById('systemScreen').classList.add('active');
            showToast('欢迎进入属性分配系统！', 'success');
        }

        // 随机数生成
        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // 抽取属性
        function drawAttributes() {
            const btn = document.getElementById('btnDraw');
            btn.disabled = true;
            btn.classList.add('btn-loading');
            btn.innerHTML = '<span>🎲</span> 抽取中...';

            // 模拟抽取动画
            setTimeout(() => {
                // 生成随机属性
                const attributes = attributeTypes.map(type => {
                    return {
                        ...type,
                        value: randomInt(type.min, type.max)
                    };
                });

                state.drawnAttributes = attributes;
                renderDrawnAttributes(attributes);

                // 启用分配按钮
                document.getElementById('btnAllocate').disabled = false;

                btn.disabled = false;
                btn.classList.remove('btn-loading');
                btn.innerHTML = '<span>🎲</span> 重新抽取';

                showToast(`抽取成功！获得了 ${attributes.length} 个属性`, 'info');
            }, 800);
        }

        // 渲染抽取的属性
        function renderDrawnAttributes(attributes) {
            const container = document.getElementById('drawResult');
            container.innerHTML = attributes.map(attr => `
                <div class="attribute-item">
                    <span>${attr.icon}</span>
                    <span class="attribute-name">${attr.name}</span>
                    <span class="attribute-value ${attr.value > 15 ? 'positive' : ''}">+${attr.value}</span>
                </div>
            `).join('');
        }

        // 分配属性
        function allocateAttributes() {
            if (!state.drawnAttributes) {
                showToast('请先抽取属性！', 'warning');
                return;
            }

            const btn = document.getElementById('btnAllocate');
            btn.disabled = true;
            btn.classList.add('btn-loading');
            btn.innerHTML = '<span>📥</span> 分配中...';

            setTimeout(() => {
                // 分配属性到角色
                state.drawnAttributes.forEach(attr => {
                    const key = attr.key;
                    const oldValue = state.character[key];
                    const newValue = Math.min(oldValue + attr.value, state.maxAttribute);
                    state.character[key] = newValue;
                });

                // 更新UI
                updateCharacterDisplay();

                // 添加记录
                addAllocationLog();

                // 重置状态
                state.drawnAttributes = null;
                document.getElementById('drawResult').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✨</div>
                        <p>点击"抽取属性"开始</p>
                    </div>
                `;

                document.getElementById('btnDraw').disabled = false;
                document.getElementById('btnDraw').classList.remove('btn-loading');
                document.getElementById('btnDraw').innerHTML = '<span>🎲</span> 抽取属性';
                btn.classList.remove('btn-loading');
                btn.innerHTML = '<span>📥</span> 分配属性';

                showToast('属性分配成功！', 'success');
            }, 600);
        }

        // 更新角色属性显示
        function updateCharacterDisplay() {
            attributeTypes.forEach(type => {
                const key = type.key;
                const value = state.character[key];
                const percentage = (value / state.maxAttribute) * 100;

                // 更新进度条
                document.getElementById(`bar${capitalize(key)}`).style.width = `${percentage}%`;
                
                // 更新数值并添加动画
                const valueEl = document.getElementById(`val${capitalize(key)}`);
                valueEl.textContent = value;
                valueEl.classList.add('increased');
                setTimeout(() => valueEl.classList.remove('increased'), 500);
            });
        }

        // 添加分配记录
        function addAllocationLog() {
            state.allocationCount++;
            const logContainer = document.getElementById('allocationLog');
            
            // 移除空状态
            const emptyState = logContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <strong>第 ${state.allocationCount} 次分配</strong><br>
                力量: +${state.drawnAttributes.find(a => a.key === 'strength').value} | 
                敏捷: +${state.drawnAttributes.find(a => a.key === 'agility').value} | 
                智力: +${state.drawnAttributes.find(a => a.key === 'intelligence').value}<br>
                体质: +${state.drawnAttributes.find(a => a.key === 'vitality').value} | 
                幸运: +${state.drawnAttributes.find(a => a.key === 'luck').value}
            `;

            logContainer.insertBefore(entry, logContainer.firstChild);
        }

        // 重置系统
        function resetSystem() {
            state.character = {
                strength: 10,
                agility: 10,
                intelligence: 10,
                vitality: 10,
                luck: 10
            };
            state.drawnAttributes = null;
            state.allocationCount = 0;

            // 重置UI
            attributeTypes.forEach(type => {
                const key = type.key;
                document.getElementById(`bar${capitalize(key)}`).style.width = '10%';
                document.getElementById(`val${capitalize(key)}`).textContent = '10';
            });

            document.getElementById('drawResult').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">✨</div>
                    <p>点击"抽取属性"开始</p>
                </div>
            `;

            document.getElementById('allocationLog').innerHTML = `
                <div class="empty-state">
                    <p>暂无分配记录</p>
                </div>
            `;

            document.getElementById('btnAllocate').disabled = true;
            document.getElementById('btnDraw').disabled = false;
            document.getElementById('btnDraw').classList.remove('btn-loading');
            document.getElementById('btnDraw').innerHTML = '<span>🎲</span> 抽取属性';

            showToast('系统已重置！', 'info');
        }

        // 首字母大写
        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // 显示Toast消息
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icons = {
                success: '✓',
                error: '✕',
                warning: '⚠',
                info: 'ℹ'
            };
            
            toast.innerHTML = `<span>${icons[type]}</span> ${message}`;
            container.appendChild(toast);

            // 3秒后移除
            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }
    </script>
</body>
</html>

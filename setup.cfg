[flake8]
max-line-length = 127
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    build,
    dist,
    web_build,
    .github

[isort]
profile = black
skip_gitignore = true
skip = web_build,.github

[black]
line-length = 127
target-version = ['py311']
extend-exclude = "web_build/|\.github/"

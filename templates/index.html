<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修仙模拟器 - 飞升之路</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SimSun', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 3.5rem;
            color: #ffd700;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        h2 {
            font-size: 1.8rem;
            color: #4caf50;
            margin-bottom: 2rem;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        button {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .start-btn {
            background: linear-gradient(45deg, #4caf50, #45a049);
            color: white;
        }
        
        .continue-btn {
            background: linear-gradient(45deg, #2196f3, #0b7dda);
            color: white;
        }
        
        .settings-btn {
            background: linear-gradient(45deg, #ff9800, #f57c00);
            color: white;
        }
        
        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .save-list {
            margin-top: 2rem;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 1rem;
        }
        
        .save-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            margin: 0.5rem 0;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .save-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .save-item h3 {
            color: #ffd700;
            margin-bottom: 0.5rem;
        }
        
        .save-item p {
            color: #ccc;
            font-size: 0.9rem;
        }
        
        .loading {
            display: none;
            margin-top: 1rem;
            color: #4caf50;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .container {
                margin: 1rem;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>修仙模拟器</h1>
        <h2>飞升之路</h2>
        
        <div class="buttons">
            <button class="start-btn" onclick="location.href='/start'">🎮 开始游戏</button>
            <button class="continue-btn" onclick="loadSaves()">📂 继续游戏</button>
            <button class="settings-btn" onclick="alert('设置功能开发中...')">⚙️ 设置</button>
        </div>
        
        <div id="save-list" class="save-list">
            <!-- 存档列表将通过JavaScript动态添加 -->
        </div>
        
        <div id="loading" class="loading">加载中...</div>
    </div>
    
    <script>
        async function loadSaves() {
            const saveList = document.getElementById('save-list');
            const loading = document.getElementById('loading');
            
            loading.style.display = 'block';
            saveList.innerHTML = '';
            
            try {
                const response = await fetch('/api/saves');
                const saves = await response.json();
                
                if (saves.length > 0) {
                    saveList.innerHTML = '<h3 style="color: #ffd700; margin-bottom: 1rem;">存档列表</h3>';
                    
                    saves.forEach(save => {
                        const saveItem = document.createElement('div');
                        saveItem.className = 'save-item';
                        saveItem.onclick = () => loadGame(save.name);
                        
                        saveItem.innerHTML = `
                            <h3>${save.player_name}</h3>
                            <p>境界: ${save.realm} | 寿元: ${save.lifetime}年</p>
                        `;
                        
                        saveList.appendChild(saveItem);
                    });
                } else {
                    saveList.innerHTML = '<p style="color: #ccc;">暂无存档</p>';
                }
            } catch (error) {
                saveList.innerHTML = '<p style="color: #f44336;">加载存档失败</p>';
                console.error('加载存档失败:', error);
            } finally {
                loading.style.display = 'none';
            }
        }
        
        async function loadGame(playerName) {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            try {
                const response = await fetch(`/api/load/${playerName}`);
                const result = await response.json();
                
                if (result.success) {
                    location.href = '/game';
                } else {
                    alert(result.error || '加载失败');
                }
            } catch (error) {
                alert('加载失败');
                console.error('加载游戏失败:', error);
            } finally {
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
